user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Логи
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # SSL глобальные настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Jino (и др. прокси) завершают TLS и шлют на VPS только HTTP:80. Тогда
    # безусловный редирект на https даёт ERR_TOO_MANY_REDIRECTS. Не редиректим,
    # если клиент уже был по HTTPS (стандартный заголовок от прокси).
    map $http_x_forwarded_proto $redirect_http_to_https {
        default 1;
        https   0;
    }

    # ─── Порт 80: ACME + редирект на HTTPS, кроме запросов за TLS-прокси ─────
    server {
        listen 80;
        server_name www.engbotai.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://engbotai.ru$request_uri;
        }
    }

    server {
        listen 80;
        server_name engbotai.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }

    server {
        listen 80;
        server_name pgadmin.engbotai.ru;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location /.well-known/acme-challenge/ {
            auth_basic off;
            root /var/www/certbot;
        }

        location / {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://pgadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /;
        }
    }

    server {
        listen 80;
        server_name portainer.engbotai.ru;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location /.well-known/acme-challenge/ {
            auth_basic off;
            root /var/www/certbot;
        }

        location / {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/websocket/ {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://portainer:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name netdata.engbotai.ru;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location /.well-known/acme-challenge/ {
            auth_basic off;
            root /var/www/certbot;
        }

        location / {
            if ($redirect_http_to_https) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://netdata:19999;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── www → голый домен ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name www.engbotai.ru;

        ssl_certificate     /etc/nginx/ssl/engbotai.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/engbotai.ru/privkey.pem;

        return 301 https://engbotai.ru$request_uri;
    }

    # ─── engbotai.ru — основная игра ────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name engbotai.ru;

        ssl_certificate     /etc/nginx/ssl/engbotai.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/engbotai.ru/privkey.pem;

        # Статика клиента
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API
        location /api/ {
            proxy_pass http://server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (Socket.io)
        location /socket.io/ {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }

    # ─── pgadmin.engbotai.ru ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name pgadmin.engbotai.ru;

        ssl_certificate     /etc/nginx/ssl/engbotai.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/engbotai.ru/privkey.pem;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location / {
            proxy_pass http://pgadmin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /;
        }
    }

    # ─── portainer.engbotai.ru ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name portainer.engbotai.ru;

        ssl_certificate     /etc/nginx/ssl/engbotai.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/engbotai.ru/privkey.pem;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location / {
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Portainer WebSocket
        location /api/websocket/ {
            proxy_pass http://portainer:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─── netdata.engbotai.ru ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name netdata.engbotai.ru;

        ssl_certificate     /etc/nginx/ssl/engbotai.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/engbotai.ru/privkey.pem;

        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;

        location / {
            proxy_pass http://netdata:19999;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
